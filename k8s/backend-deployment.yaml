apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osint-backend
  template:
    metadata:
      labels:
        app: osint-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/ibrahimkhalilmasud/osint-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: osint-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: osint-backend
spec:
  selector:
    app: osint-backend
  ports:
    - port: 8000
      targetPort: 8000
